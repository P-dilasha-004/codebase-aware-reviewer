name: Deploy Pattern Buddy to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'ingestion/**'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}  # allows manual re-deploy

concurrency:
  group: deploy-pattern-buddy
  cancel-in-progress: false  # never cancel a deploy mid-flight

jobs:
  deploy:
    name: Zip and deploy to App Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment package
        run: |
          zip -r deploy.zip api/ ingestion/ requirements.txt \
            -x "**/__pycache__/*" -x "**/tests/*" -x "**/*.pyc"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to pattern-buddy-v2
        run: |
          # az webapp deploy's own poller tracks Kudu's deployment-sync status, not the
          # container's actual running state — it has been observed to time out at 10 min
          # and report failure even though the site is already up and healthy underneath.
          # Don't fail the job on that; the health check below is the real source of truth.
          az webapp deploy \
            --name pattern-buddy-v2 \
            --resource-group pattern-buddy-rg \
            --src-path deploy.zip \
            --type zip \
          || echo "az webapp deploy reported a non-zero exit — deferring to the health check to determine actual success"

      - name: Verify health endpoint
        run: |
          for i in $(seq 1 15); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://pattern-buddy-v2-gabre3endda8gwck.northcentralus-01.azurewebsites.net/health)
            echo "Attempt $i: health check status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" == "200" ]; then
              exit 0
            fi
            sleep 20
          done
          echo "ERROR: /health did not return 200 after deploy (waited 5 min)"
          exit 1

      - name: Azure logout
        if: always()
        run: az logout
