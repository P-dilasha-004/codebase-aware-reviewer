name: Pattern Buddy Weekly Rebuild

on:
  schedule:
    - cron: '0 3 * * 0'  # Sundays 03:00 UTC (off-peak) — planning.md Phase 4.3
  workflow_dispatch: {}  # allows manual re-trigger (Failure Mode #3 recovery path)

concurrency:
  group: weekly-rebuild-${{ github.repository }}
  cancel-in-progress: false

jobs:
  trigger-rebuild:
    name: Trigger Pattern Buddy weekly rebuild
    runs-on: ubuntu-latest

    steps:
      - name: Build and sign payload, POST to Pattern Buddy
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          BACKEND_API_URL: https://pattern-buddy-v2-gabre3endda8gwck.northcentralus-01.azurewebsites.net
        run: |
          PAYLOAD=$(jq -cn \
            --arg repo_id "${{ github.repository }}" \
            --arg branch  "main" \
            '{repo_id: $repo_id, branch: $branch}')

          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print $2}')"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${BACKEND_API_URL}/admin/reindex" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: ${SIGNATURE}" \
            -d "$PAYLOAD")

          echo "Response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "202" ]; then
            echo "ERROR: Expected 202 Accepted, got $HTTP_STATUS"
            exit 1
          fi
